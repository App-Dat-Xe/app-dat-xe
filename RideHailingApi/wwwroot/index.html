<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Hailing API - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .features {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .feature {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .feature i {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .feature h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .feature p {
            font-size: 12px;
            margin: 0;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>🚗 Ride Hailing API</h1>
        <p>Hệ thống quản lý đặt xe thông minh với cơ chế failover tự động</p>
        <a href="/admin.html" class="btn">
            <i class="fas fa-tachometer-alt"></i> Truy cập Admin Dashboard
        </a>
        
        <div class="features">
            <div class="feature">
                <i class="fas fa-users"></i>
                <h3>Quản lý Users</h3>
                <p>Quản lý người dùng</p>
            </div>
            <div class="feature">
                <i class="fas fa-id-card"></i>
                <h3>Quản lý Tài xế</h3>
                <p>Theo dõi tài xế</p>
            </div>
            <div class="feature">
                <i class="fas fa-car"></i>
                <h3>Chuyến xe</h3>
                <p>Quản lý chuyến đi</p>
            </div>
            <div class="feature">
                <i class="fas fa-dollar-sign"></i>
                <h3>Doanh thu</h3>
                <p>Báo cáo chi tiết</p>
            </div>
        </div>
    </div>
</body>
</html>
